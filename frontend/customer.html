<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khách hàng</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/map.css">
    <link rel="stylesheet" href="./css/customer.css">
    <script src="js/auth.js" defer></script>
    <script src="js/map.js" defer></script>
</head>

<body>
    <div id="map"></div>

    <button onclick="logout()"
        style="position: absolute; top: 10px; right: 10px; z-index: 1000; padding: 10px; background: var(--error-color); color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold;">Đăng
        xuất</button>

    <div class="booking-panel">
        <h3 class="panel-title">Đặt xe Taxi</h3>

        <div class="input-group">
            <label>Điểm đón (Cờ Xanh):</label>
            <input type="text" id="pickup-input" placeholder="Click bản đồ để chọn..." readonly>
        </div>

        <div class="input-group">
            <label>Điểm đến (Cờ Đỏ):</label>
            <input type="text" id="dropoff-input" placeholder="Click bản đồ để chọn..." readonly>
        </div>

        <div class="info-row">
            <span class="distance-info" id="distance-info">Khoảng cách: -- km</span>
            <span class="price-info" id="price-info">Dự kiến: -- VNĐ</span>
        </div>

        <button class="btn-primary" id="book-btn" disabled>Đặt xe ngay</button>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        // Bảo vệ route: Chỉ Role 4 (Customer) mới được vào
        checkAuth(4);

        // Hàm đăng xuất nhanh
        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
