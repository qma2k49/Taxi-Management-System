<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Hệ thống Quản lý Taxi</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/auth.js" defer></script>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-box">
            <h2 class="form-title">Hệ thống Điều hành Taxi</h2>
            <p class="form-subtitle">Vui lòng đăng nhập để tiếp tục</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" placeholder="Nhập tài khoản..." required>
                </div>
                
                <div class="input-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" placeholder="Nhập mật khẩu..." required>
                </div>
                
                <p id="error-message" class="error-text"></p>
                
                <button type="submit" class="btn-primary">Đăng nhập</button>
            </form>
        </div>
    </div>

</body>
</html>
